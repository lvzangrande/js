<body>
    <h1>ex006 curso JavaScript do Curso em vídeo/curse of JavaScript by Curso em vídeo</h1>
    <script>
    window.alert('Bem vindo ao sistema de formatação monetária');
    let value = Number(window.prompt('Digite o valor que deseja formatar'));
    let money_value = parseFloat(value).toFixed(2).replace('.',',');

    document.write(`O sistema converteu:<br><strong>${value}</strong><br>Para:<strong>${money_value}</strong>`);
    </script>
</body>
